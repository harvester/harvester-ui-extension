name: "[PR Management] Auto Assign Reviewers and Assignee"
on:
  pull_request:
    types: [opened]

jobs:
  assign:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Auto assign author and reviewers
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, number } = context.issue;
            const author = context.payload.pull_request.user.login;

            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: number,
              assignees: [author]
            });

            await github.rest.pulls.requestReviewers({
              owner,
              repo,
              pull_number: number,
              reviewers: ['a110605', 'houhoucoop']
            });